<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f4f4;
        }

        .container{
            width:500px;
            background:#fff;
            padding:40px;
            text-align:center;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
            margin-bottom:20px;
        }

        .prediction{
            font-size:32px;
            color:#28a745;
            font-weight:bold;
            margin:25px 0;
        }

        a{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#007bff;
            color:#fff;
            text-decoration:none;
            border-radius:5px;
        }

        a:hover{
            background:#0056b3;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Wine Quality Prediction</h1>

    <p>Predicted Wine Quality</p>

    <div class="prediction">
        {{ prediction }}
    </div>

    <a href="/">Predict Another Wine</a>

</div>

</body>
</html>
