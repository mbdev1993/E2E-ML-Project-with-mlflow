<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Quality Prediction</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:700px;
            background:#fff;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:15px;
        }

        .form-group{
            display:flex;
            flex-direction:column;
        }

        label{
            font-weight:bold;
            margin-bottom:5px;
        }

        input{
            padding:10px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .btn{
            width:100%;
            margin-top:25px;
            padding:12px;
            background:#007BFF;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        .btn:hover{
            background:#0056b3;
        }

        .result{
            margin-top:20px;
            text-align:center;
            font-size:20px;
            color:green;
            font-weight:bold;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>Wine Quality Prediction</h1>

    <form action="/predict" method="POST">

        <div class="grid">

            <div class="form-group">
                <label>Fixed Acidity</label>
                <input type="number" step="any" name="fixed_acidity" required>
            </div>

            <div class="form-group">
                <label>Volatile Acidity</label>
                <input type="number" step="any" name="volatile_acidity" required>
            </div>

            <div class="form-group">
                <label>Citric Acid</label>
                <input type="number" step="any" name="citric_acid" required>
            </div>

            <div class="form-group">
                <label>Residual Sugar</label>
                <input type="number" step="any" name="residual_sugar" required>
            </div>

            <div class="form-group">
                <label>Chlorides</label>
                <input type="number" step="any" name="chlorides" required>
            </div>

            <div class="form-group">
                <label>Free Sulfur Dioxide</label>
                <input type="number" step="any" name="free_sulfur_dioxide" required>
            </div>

            <div class="form-group">
                <label>Total Sulfur Dioxide</label>
                <input type="number" step="any" name="total_sulfur_dioxide" required>
            </div>

            <div class="form-group">
                <label>Density</label>
                <input type="number" step="any" name="density" required>
            </div>

            <div class="form-group">
                <label>pH</label>
                <input type="number" step="any" name="pH" required>
            </div>

            <div class="form-group">
                <label>Sulphates</label>
                <input type="number" step="any" name="sulphates" required>
            </div>

            <div class="form-group">
                <label>Alcohol</label>
                <input type="number" step="any" name="alcohol" required>
            </div>

        </div>

        <button class="btn" type="submit">
            Predict Wine Quality
        </button>

    </form>

    {% if prediction %}
        <div class="result">
            Predicted Wine Quality : {{ prediction }}
        </div>
    {% endif %}

</div>

</body>
</html>
